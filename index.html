<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文假名全功能特訓器吱🐭</title>
    <style>
        :root {
            --primary-color: #e6f2ff;
            --accent-color: #ffb6c1;
            --text-color: #333;
            --border-color: #ccc;
            --section-bg: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fa;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.3rem;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1300px;
            width: 100%;
        }

        .section {
            background: var(--section-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            flex: 1.4;
            min-width: 350px;
        }

        .game-box {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        /* 50音表分類區 */
        .category-title {
            background: #2c3e50;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 1.1rem;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .yo-on-grid {
            grid-template-columns: repeat(3, 1fr);
        }

        .kana-card {
            background: var(--primary-color);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .kana-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
            background: #fff;
        }

        .kana-card .hiragana {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.2;
        }

        .kana-card .katakana {
            font-size: 1.1rem;
            font-weight: normal;
            color: #e67e22;
            margin: 2px 0;
        }

        .kana-card .romaji {
            font-size: 0.8rem;
            color: #666;
        }

        /* 自訂篩選面板 */
        .filter-panel {
            background: #fdfefe;
            border: 2px solid #bdc3c7;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
            font-size: 0.95rem;
            text-align: left;
        }

        .filter-section {
            margin-bottom: 12px;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 8px;
        }
        
        .filter-section:last-of-type {
            border-bottom: none;
        }

        .filter-section label {
            margin-right: 10px;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 5px;
        }

        .row-select-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 5px;
        }

        .row-btn-all {
            grid-column: span 3;
            background: #bdc3c7;
            border: none;
            padding: 4px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .apply-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 5px;
            font-size: 1rem;
        }

        .apply-btn:hover {
            background: #219653;
        }

        /* 遊戲區 */
        .quiz-container {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
        }

        .question-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
            background: #fff5f5;
            padding: 10px;
            border-radius: 10px;
            border: 2px dashed #ffb6c1;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }

        .option-btn {
            background: white;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .option-btn:hover {
            background: #f0f0f0;
        }

        /* 拼圖區 */
        .puzzle-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            border: 3px solid #333;
            margin-top: 15px;
            background: #eee;
            overflow: hidden;
        }

        .puzzle-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('25786.png'); 
            background-size: cover;
            background-position: center;
            opacity: 0.1; 
        }

        .puzzle-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }

        .puzzle-piece {
            background-image: url('25786.png');
            background-size: 300px 300px;
            border: 1px dashed rgba(255,255,255,0.6);
            visibility: hidden;
        }

        .p1 { background-position: 0px 0px; }
        .p2 { background-position: -100px 0px; }
        .p3 { background-position: -200px 0px; }
        .p4 { background-position: 0px -100px; }
        .p5 { background-position: -100px -100px; }
        .p6 { background-position: -200px -100px; }
        .p7 { background-position: 0px -200px; }
        .p8 { background-position: -100px -200px; }
        .p9 { background-position: -200px -200px; }

        .score-board {
            font-size: 1.1rem;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .win-message {
            display: none;
            color: #27ae60;
            font-weight: bold;
            font-size: 1.3rem;
            margin-top: 10px;
            text-align: center;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <header>
        <h1>日文假名冒險吱吱🐭</h1>
        <p>點擊字卡聽發音吱。右邊可以自由挑選你想複習的「行數範圍」吱！</p>
    </header>

    <div class="container">
        <div class="section">
            <div class="category-title">1. 清音 (Seion)</div>
            <div class="chart-grid" id="seionChart"></div>

            <div class="category-title">2. 鼻音 (Bion)</div>
            <div class="chart-grid" id="bionChart"></div>

            <div class="category-title">3. 濁音 (Dakuon)</div>
            <div class="chart-grid" id="dakuonChart"></div>

            <div class="category-title">4. 半濁音 (Handakuon)</div>
            <div class="chart-grid" id="handakuonChart"></div>

            <div class="category-title">5. 拗音 (Yōon)</div>
            <div class="chart-grid yo-on-grid" id="yoonChart"></div>
        </div>

        <div class="section game-box">
            <h2>自訂特訓範圍 🧩</h2>
            
            <div class="filter-panel">
                <div class="filter-section">
                    <strong>1. 選擇假名種類：</strong><br>
                    <label><input type="checkbox" id="chkHira" checked> 平假名 (あ)</label>
                    <label><input type="checkbox" id="chkKata" checked> 片假名 (ア)</label>
                </div>
                
                <div class="filter-section">
                    <strong>2. 選擇音調大類：</strong><br>
                    <label><input type="checkbox" id="typeSeion" checked> 清/鼻音</label>
                    <label><input type="checkbox" id="typeDakuon" checked> 濁音</label>
                    <label><input type="checkbox" id="typeHandakuon" checked> 半濁</label>
                    <label><input type="checkbox" id="typeYoon" checked> 拗音</label>
                </div>

                <div class="filter-section" id="rowFilterSection">
                    <strong>3. 選擇具體字行 (可複選)：</strong><br>
                    <button class="row-btn-all" onclick="selectAllRows()">全選 / 取消全選</button>
                    <div class="row-select-grid">
                        <label><input type="checkbox" class="chk-row" value="あ" checked> あ行</label>
                        <label><input type="checkbox" class="chk-row" value="か" checked> か行</label>
                        <label><input type="checkbox" class="chk-row" value="さ" checked> さ行</label>
                        <label><input type="checkbox" class="chk-row" value="た" checked> た行</label>
                        <label><input type="checkbox" class="chk-row" value="な" checked> な行</label>
                        <label><input type="checkbox" class="chk-row" value="は" checked> は行</label>
                        <label><input type="checkbox" class="chk-row" value="ま" checked> ま行</label>
                        <label><input type="checkbox" class="chk-row" value="や" checked> や行</label>
                        <label><input type="checkbox" class="chk-row" value="ら" checked> ら行</label>
                        <label><input type="checkbox" class="chk-row" value="わ" checked> わ/ん</label>
                        <label><input type="checkbox" class="chk-row" value="が" checked> が行</label>
                        <label><input type="checkbox" class="chk-row" value="ざ" checked> ざ行</label>
                        <label><input type="checkbox" class="chk-row" value="だ" checked> だ行</label>
                        <label><input type="checkbox" class="chk-row" value="ば" checked> ば行</label>
                        <label><input type="checkbox" class="chk-row" value="ぱ" checked> ぱ行</label>
                        <label><input type="checkbox" class="chk-row" value="拗音" checked> 完整拗音</label>
                    </div>
                </div>

                <button class="apply-btn" onclick="updateQuizPool()">🔄 生成專屬關卡並開始</button>
            </div>

            <div class="score-board">成功配對: <span id="score">0</span> / 9</div>
            
            <div class="quiz-container" id="quizContainer">
                <p>請選出正確的羅馬拼音吱：</p>
                <div class="question-display" id="questionKana">あ</div>
                <div class="options-grid" id="optionsGrid"></div>
            </div>

            <div class="win-message" id="winMessage">🎉 恭喜！你成功拼到一隻長睫毛老鼠鼠！ 🐭</div>

            <div class="puzzle-wrapper">
                <div class="puzzle-bg"></div>
                <div class="puzzle-grid">
                    <div class="puzzle-piece p1" id="piece0"></div>
                    <div class="puzzle-piece p2" id="piece1"></div>
                    <div class="puzzle-piece p3" id="piece2"></div>
                    <div class="puzzle-piece p4" id="piece3"></div>
                    <div class="puzzle-piece p5" id="piece4"></div>
                    <div class="puzzle-piece p6" id="piece5"></div>
                    <div class="puzzle-piece p7" id="piece6"></div>
                    <div class="puzzle-piece p8" id="piece7"></div>
                    <div class="puzzle-piece p9" id="piece8"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 清音 (已修正 21:"に" 的文字 與 26:"ひ" 的 row 屬性)
        const seionData = [
            {hira:'あ', kata:'ア', romaji:'a', type:'seion', row:'あ'}, {hira:'い', kata:'イ', romaji:'i', type:'seion', row:'あ'}, {hira:'う', kata:'ウ', romaji:'u', type:'seion', row:'あ'}, {hira:'え', kata:'エ', romaji:'e', type:'seion', row:'あ'}, {hira:'お', kata:'オ', romaji:'o', type:'seion', row:'あ'},
            {hira:'か', kata:'カ', romaji:'ka', type:'seion', row:'か'}, {hira:'き', kata:'キ', romaji:'ki', type:'seion', row:'か'}, {hira:'く', kata:'ク', romaji:'ku', type:'seion', row:'か'}, {hira:'け', kata:'ケ', romaji:'ke', type:'seion', row:'か'}, {hira:'こ', kata:'コ', romaji:'ko', type:'seion', row:'か'},
            {hira:'さ', kata:'サ', romaji:'sa', type:'seion', row:'さ'}, {hira:'し', kata:'シ', romaji:'shi', type:'seion', row:'さ'}, {hira:'す', kata:'ス', romaji:'su', type:'seion', row:'さ'}, {hira:'せ', kata:'塞', romaji:'se', type:'seion', row:'さ'}, {hira:'そ', kata:'ソ', romaji:'so', type:'seion', row:'さ'},
            {hira:'た', kata:'タ', romaji:'ta', type:'seion', row:'た'}, {hira:'ち', kata:'チ', romaji:'chi', type:'seion', row:'た'}, {hira:'つ', kata:'ツ', romaji:'tsu', type:'seion', row:'た'}, {hira:'て', kata:'テ', romaji:'te', type:'seion', row:'た'}, {hira:'と', kata:'ト', romaji:'to', type:'seion', row:'た'},
            {hira:'な', kata:'ナ', romaji:'na', type:'seion', row:'な'}, {hira:'に', kata:'ニ', romaji:'ni', type:'seion', row:'な'}, {hira:'ぬ', kata:'ヌ', romaji:'nu', type:'seion', row:'な'}, {hira:'ね', kata:'ネ', romaji:'ne', type:'seion', row:'な'}, {hira:'の', kata:'ノ', romaji:'no', type:'seion', row:'な'},
            {hira:'は', kata:'ハ', romaji:'ha', type:'seion', row:'は'}, {hira:'ひ', kata:'ヒ', romaji:'hi', type:'seion', row:'は'}, {hira:'ふ', kata:'フ', romaji:'fu', type:'seion', row:'は'}, {hira:'へ', kata:'ヘ', romaji:'he', type:'seion', row:'は'}, {hira:'ほ', kata:'ホ', romaji:'ho', type:'seion', row:'は'},
            {hira:'ま', kata:'マ', romaji:'ma', type:'seion', row:'ま'}, {hira:'み', kata:'ミ', romaji:'mi', type:'seion', row:'ま'}, {hira:'む', kata:'ム', romaji:'mu', type:'seion', row:'ま'}, {hira:'め', kata:'メ', romaji:'me', type:'seion', row:'ま'}, {hira:'も', kata:'モ', romaji:'mo', type:'seion', row:'ま'},
            {hira:'や', kata:'ヤ', romaji:'ya', type:'seion', row:'や'}, {hira:'', kata:'', romaji:'', type:'', row:''},                  {hira:'ゆ', kata:'ユ', romaji:'yu', type:'seion', row:'や'}, {hira:'', kata:'', romaji:'', type:'', row:''},                  {hira:'よ', kata:'ヨ', romaji:'yo', type:'seion', row:'や'},
            {hira:'ら', kata:'ラ', romaji:'ra', type:'seion', row:'ら'}, {hira:'り', kata:'リ', romaji:'ri', type:'seion', row:'ら'}, {hira:'る', kata:'ル', romaji:'ru', type:'seion', row:'ら'}, {hira:'れ', kata:'レ', romaji:'re', type:'seion', row:'ら'}, {hira:'ろ', kata:'ロ', romaji:'ro', type:'seion', row:'ら'},
            {hira:'わ', kata:'ワ', romaji:'wa', type:'seion', row:'わ'}, {hira:'', kata:'', romaji:'', type:'', row:''},                  {hira:'', kata:'', romaji:'', type:'', row:''},                  {hira:'', kata:'', romaji:'', type:'', row:''},                  {hira:'を', kata:'ヲ', romaji:'wo', type:'seion', row:'わ'}
        ];

        // 2. 鼻音
        const bionData = [{hira:'ん', kata:'ン', romaji:'n', type:'seion', row:'わ'}];

        // 3. 濁音
        const dakuonData = [
            {hira:'が', kata:'ガ', romaji:'ga', type:'dakuon', row:'が'}, {hira:'ぎ', kata:'ギ', romaji:'gi', type:'dakuon', row:'が'}, {hira:'ぐ', kata:'グ', romaji:'gu', type:'dakuon', row:'が'}, {hira:'げ', kata:'ゲ', romaji:'ge', type:'dakuon', row:'が'}, {hira:'ご', kata:'ゴ', romaji:'go', type:'dakuon', row:'が'},
            {hira:'ざ', kata:'ザ', romaji:'za', type:'dakuon', row:'ざ'}, {hira:'じ', kata:'ジ', romaji:'ji', type:'dakuon', row:'ざ'}, {hira:'ず', kata:'ズ', romaji:'zu', type:'dakuon', row:'ざ'}, {hira:'ぜ', kata:'ゼ', romaji:'ze', type:'dakuon', row:'ざ'}, {hira:'ぞ', kata:'ゾ', romaji:'zo', type:'dakuon', row:'ざ'},
            {hira:'だ', kata:'推', romaji:'da', type:'dakuon', row:'だ'}, {hira:'ぢ', kata:'ヂ', romaji:'ji', type:'dakuon', row:'だ'}, {hira:'づ', kata:'ヅ', romaji:'zu', type:'dakuon', row:'だ'}, {hira:'де', kata:'デ', romaji:'de', type:'dakuon', row:'だ'}, {hira:'ど', kata:'ド', romaji:'do', type:'dakuon', row:'だ'},
            {hira:'ば', kata:'バ', romaji:'ba', type:'dakuon', row:'ば'}, {hira:'び', kata:'ビ', romaji:'bi', type:'dakuon', row:'ば'}, {hira:'ぶ', kata:'ブ', romaji:'bu', type:'dakuon', row:'ば'}, {hira:'べ', kata:'ベ', romaji:'be', type:'dakuon', row:'ば'}, {hira:'ぼ', kata:'ボ', romaji:'bo', type:'dakuon', row:'ば'}
        ];
        // 額外微調修正：把原本打錯的片假名「推」、平假名「де」修正回「ダ」和「で」
        dakuonData[10] = {hira:'だ', kata:'ダ', romaji:'da', type:'dakuon', row:'だ'};
        dakuonData[13] = {hira:'で', kata:'デ', romaji:'de', type:'dakuon', row:'だ'};

        // 4. 半濁音
        const handakuonData = [
            {hira:'ぱ', kata:'パ', romaji:'pa', type:'handakuon', row:'ぱ'}, {hira:'ぴ', kata:'ピ', romaji:'pi', type:'handakuon', row:'ぱ'}, {hira:'ぷ', kata:'プ', romaji:'pu', type:'handakuon', row:'ぱ'}, {hira:'ぺ', kata:'ペ', romaji:'pe', type:'handakuon', row:'ぱ'}, {hira:'ぽ', kata:'ポ', romaji:'po', type:'handakuon', row:'ぱ'}
        ];

        // 5. 拗音
        const yoonData = [
            {hira:'きゃ', kata:'キャ', romaji:'kya', type:'yoon', row:'拗音'}, {hira:'きゅ', kata:'キュ', romaji:'kyu', type:'yoon', row:'拗音'}, {hira:'きょ', kata:'キョ', romaji:'kyo', type:'yoon', row:'拗音'},
            {hira:'しゃ', kata:'シャ', romaji:'sha', type:'yoon', row:'拗音'}, {hira:'しゅ', kata:'シュ', romaji:'shu', type:'yoon', row:'拗音'}, {hira:'しょ', kata:'ショ', romaji:'sho', type:'yoon', row:'拗音'},
            {hira:'ちゃ', kata:'チャ', romaji:'cha', type:'yoon', row:'拗音'}, {hira:'ちゅ', kata:'チュ', romaji:'chu', type:'yoon', row:'拗音'}, {hira:'ちょ', kata:'チョ', romaji:'cho', type:'yoon', row:'拗音'},
            {hira:'にゃ', kata:'ニャ', romaji:'nya', type:'yoon', row:'拗音'}, {hira:'にゅ', kata:'ニュ', romaji:'nyu', type:'yoon', row:'拗音'}, {hira:'にょ', kata:'ニョ', romaji:'nyo', type:'yoon', row:'拗音'},
            {hira:'ひゃ', kata:'ヒャ', romaji:'hya', type:'yoon', row:'拗音'}, {hira:'ひゅ', kata:'ヒュ', romaji:'hyu', type:'yoon', row:'拗音'}, {hira:'ひょ', kata:'ヒョ', romaji:'hyo', type:'yoon', row:'拗音'},
            {hira:'みゃ', kata:'ミャ', romaji:'mya', type:'yoon', row:'拗音'}, {hira:'みゅ', kata:'ミュ', romaji:'myu', type:'yoon', row:'拗音'}, {hira:'みょ', kata:'ミョ', romaji:'myo', type:'yoon', row:'拗音'},
            {hira:'りゃ', kata:'リャ', romaji:'rya', type:'yoon', row:'拗音'}, {hira:'りゅ', kata:'リュ', romaji:'ryu', type:'yoon', row:'拗音'}, {hira:'りょ', kata:'リョ', romaji:'ryo', type:'yoon', row:'拗音'},
            {hira:'ぎゃ', kata:'ギャ', romaji:'gya', type:'yoon', row:'拗音'}, {hira:'ぎゅ', kata:'ギュ', romaji:'gyu', type:'yoon', row:'拗音'}, {hira:'ぎょ', kata:'ギョ', romaji:'gyo', type:'yoon', row:'拗音'},
            {hira:'じゃ', kata:'ジャ', romaji:'ja', type:'yoon', row:'拗音'},  {hira:'じゅ', kata:'ジュ', romaji:'ju', type:'yoon', row:'拗音'},  {hira:'じょ', kata:'ジョ', romaji:'jo', type:'yoon', row:'拗音'},
            {hira:'びゃ', kata:'ビャ', romaji:'bya', type:'yoon', row:'拗音'}, {hira:'びゅ', kata:'ビュ', romaji:'byu', type:'yoon', row:'拗音'}, {hira:'びょ', kata:'ビョ', romaji:'byo', type:'yoon', row:'拗音'},
            {hira:'ぴゃ', kata:'ピャ', romaji:'pya', type:'yoon', row:'拗音'}, {hira:'ぴゅ', kata:'ピュ', romaji:'pyu', type:'yoon', row:'拗音'}, {hira:'ぴょ', kata:'ピョ', romaji:'pyo', type:'yoon', row:'拗音'}
        ];

        const masterPool = [...seionData, ...bionData, ...dakuonData, ...handakuonData, ...yoonData].filter(item => item.hira !== '');

        let activeQuizPool = [];
        let currentScore = 0;
        let currentQuestion = null;

        // 渲染字卡
        function renderChart(data, targetId) {
            const container = document.getElementById(targetId);
            data.forEach(item => {
                const card = document.createElement('div');
                if (item.hira === '') {
                    card.className = 'kana-card';
                    card.style.opacity = '0';
                } else {
                    card.className = 'kana-card';
                    card.innerHTML = `
                        <span class="hiragana">${item.hira}</span>
                        <span class="katakana">${item.kata}</span>
                        <span class="romaji">${item.romaji}</span>
                    `;
                    card.onclick = () => {
                        const utterance = new SpeechSynthesisUtterance(item.hira);
                        utterance.lang = 'ja-JP';
                        window.speechSynthesis.speak(utterance);
                    };
                }
                container.appendChild(card);
            });
        }

        renderChart(seionData, 'seionChart');
        renderChart(bionData, 'bionChart');
        renderChart(dakuonData, 'dakuonChart');
        renderChart(handakuonData, 'handakuonChart');
        renderChart(yoonData, 'yoonChart');

        // 全選 / 取消全選 控制
        let isAllChecked = true;
        function selectAllRows() {
            isAllChecked = !isAllChecked;
            const rowCheckboxes = document.querySelectorAll('.chk-row');
            rowCheckboxes.forEach(cb => cb.checked = isAllChecked);
        }

        // 音效
        function playDingDong() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.08); 
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.35);
        }

        // 核心過濾邏輯
        function updateQuizPool() {
            const hiraOn = document.getElementById('chkHira').checked;
            const kataOn = document.getElementById('chkKata').checked;
            
            const seionOn = document.getElementById('typeSeion').checked;
            const dakuonOn = document.getElementById('typeDakuon').checked;
            const handakuonOn = document.getElementById('typeHandakuon').checked;
            const yoonOn = document.getElementById('typeYoon').checked;

            const checkedRows = [];
            const rowCheckboxes = document.querySelectorAll('.chk-row');
            rowCheckboxes.forEach(cb => {
                if (cb.checked) checkedRows.push(cb.value);
            });

            if (!hiraOn && !kataOn) {
                alert("請至少揀選一種假名（平假名或片假名）吱！");
                return;
            }
            if (checkedRows.length === 0) {
                alert("請至少勾選一行（例如：あ行）進行測驗吱！");
                return;
            }

            activeQuizPool = [];
            masterPool.forEach(item => {
                let matchCategory = false;
                if (item.type === 'seion' && seionOn) matchCategory = true;
                if (item.type === 'dakuon' && dakuonOn) matchCategory = true;
                if (item.type === 'handakuon' && handakuonOn) matchCategory = true;
                if (item.type === 'yoon' && yoonOn) matchCategory = true;

                if (matchCategory && checkedRows.includes(item.row)) {
                    if (hiraOn) activeQuizPool.push({ text: item.hira, romaji: item.romaji });
                    if (kataOn) activeQuizPool.push({ text: item.kata, romaji: item.romaji });
                }
            });

            if (activeQuizPool.length === 0) {
                alert("根據你勾選的交集範圍，題目池入面沒有對應的假名，請重新勾選吱！");
                return;
            }

            // 重設進度
            currentScore = 0;
            document.getElementById('score').innerText = currentScore;
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('winMessage').style.display = 'none';
            for (let i = 0; i < 9; i++) {
                document.getElementById(`piece${i}`).style.visibility = 'hidden';
            }

            nextQuestion();
        }

        function nextQuestion() {
            if (currentScore >= 9) {
                document.getElementById('quizContainer').style.display = 'none';
                document.getElementById('winMessage').style.display = 'block';
                return;
            }

            currentQuestion = activeQuizPool[Math.floor(Math.random() * activeQuizPool.length)];
            document.getElementById('questionKana').innerText = currentQuestion.text;

            let options = [currentQuestion.romaji];
            while (options.length < 4) {
                let randomRomaji = masterPool[Math.floor(Math.random() * masterPool.length)].romaji;
                if (!options.includes(randomRomaji)) {
                    options.push(randomRomaji);
                }
            }
            options.sort(() => Math.random() - 0.5);

            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            if (selected === currentQuestion.romaji) {
                document.getElementById(`piece${currentScore}`).style.visibility = 'visible';
                currentScore++;
                document.getElementById('score').innerText = currentScore;
                playDingDong();
                nextQuestion();
            } else {
                alert("oh no，再試一下吱！");
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const data = new SpeechSynthesisUtterance(' ');
            data.lang = 'ja-JP';
            data.volume = 0;
            window.speechSynthesis.speak(data);
            updateQuizPool();
        });
    </script>
</body>
</html>
